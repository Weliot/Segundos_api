spring.application.name=segundos-api
# Porta personalizada
server.port=8080

# Customizar path do Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.configUrl=/api-docs/swagger-config
springdoc.swagger-ui.url=/api-docs
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

spring.datasource.url=jdbc:h2:mem:segundos
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.h2.console.enabled=true

jwt.secret=986148862-997628040-997717161-1000-00001
jwt.expiration=3600000